<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
        }

        input, button {
            margin: 10px;
            padding: 10px;
            width: 90%;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📄 AI Resume Analyzer</h2>

    <p style="color:gray;">🤖 Role will be automatically predicted</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/analyze" method="POST" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <button type="submit">Analyze Resume</button>
    </form>

    
    <style>
    .btn {
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        text-decoration: none;
        border-radius: 8px;
    }
</style>
</div>

</body>
</html>
